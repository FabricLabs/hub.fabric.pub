name: Test
on:
  pull_request:
    branches:
    - '**'
  push:
    branches:
    - master
jobs:
  test:
    name: Run tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
        - macos-latest
        - ubuntu-latest
    steps:
    - name: Checkout hub
      uses: actions/checkout@v4
      with:
        path: hub
    - name: Checkout fabric-http (@fabric/http via file:../fabric-http)
      uses: actions/checkout@v4
      with:
        repository: FabricLabs/fabric-http
        ref: feature/v0.1.0-RC1
        path: fabric-http
    - name: Install Node.js on ${{ matrix.os }}
      uses: actions/setup-node@v4
      with:
        node-version-file: 'hub/.nvmrc'
        cache: 'npm'
        cache-dependency-path: hub/package-lock.json
    - name: Install dependencies
      run: npm ci
      working-directory: hub
    # browser.interface + Sandbox use Puppeteer; macOS (and some Linux) runners need an explicit browser binary (see e2e-rc.yml)
    - name: Install Chrome for Puppeteer
      run: npx puppeteer browsers install chrome
      working-directory: hub
    - name: Generate coverage report
      run: npm run report:coverage
      working-directory: hub
    - name: Mainnet RPC smoke script (no-op in CI unless FABRIC_MAINNET_RPC_SMOKE=1)
      run: npm run test:smoke-mainnet-rpc
      working-directory: hub
    - name: Send coverage report
      uses: codecov/codecov-action@v3.1.1
      with:
        directory: ./hub/reports/
